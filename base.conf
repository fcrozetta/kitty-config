# kitty-config / base.conf
#
# Curated baseline shipped via Homebrew (fcrozetta/tools/kitty-config).
# This file is included into ~/.config/kitty/kitty.conf via the
# BEGIN_KITTY_CONFIG block managed by kitty-config-setup.
#
# User overrides: add lines in ~/.config/kitty/kitty.conf BELOW the
# BEGIN_KITTY_CONFIG block. Last-write-wins applies.

# === Fonts ===
font_family       family="FiraCode Nerd Font Mono"
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         14.0
disable_ligatures never

# === Shell integration ===
shell_integration enabled

# === Tabs ===
tab_bar_edge            top
tab_bar_style           fade
tab_title_template      "{index}: {title.split('/')[-1]}"
active_tab_font_style   bold
inactive_tab_font_style normal

# === Keybinds: config reload ===
map kitty_mod+f5 load_config_file
map ctrl+cmd+,   load_config_file

# === Keybinds: tabs ===
action_alias launch_tab launch --cwd=current --type=tab

map f1 launch_tab nvim .

map kitty_mod+t   new_tab_with_cwd
map cmd+t         new_tab_with_cwd
map kitty_mod+q   close_tab
map cmd+w         close_tab

map kitty_mod+right next_tab
map shift+cmd+]     next_tab
map ctrl+tab        next_tab

map kitty_mod+left  previous_tab
map shift+cmd+[     previous_tab
map ctrl+shift+tab  previous_tab

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
