# kitty-config / base.conf
#
# Curated baseline shipped via Homebrew (fcrozetta/tools/kitty-config).
# This file is included into ~/.config/kitty/kitty.conf via the
# BEGIN_KITTY_CONFIG block managed by kitty-config-setup.
#
# User overrides: add lines in ~/.config/kitty/kitty.conf BELOW the
# BEGIN_KITTY_CONFIG block. Last-write-wins applies.

# === Fonts ===
font_family       family="FiraCode Nerd Font Mono"
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         14.0
disable_ligatures never

# === Shell integration ===
shell_integration enabled

# === Tabs ===
tab_bar_edge            top
tab_bar_style           fade
tab_title_template      "{index}: {title.split('/')[-1]}"
active_tab_font_style   bold
inactive_tab_font_style normal

# === Keybinds: config reload ===
map kitty_mod+f5 load_config_file
map ctrl+cmd+,   load_config_file

# === Keybinds: tabs ===
action_alias launch_tab launch --cwd=current --type=tab

map f1 launch_tab nvim .

map kitty_mod+t   new_tab_with_cwd
map cmd+t         new_tab_with_cwd
map kitty_mod+q   close_tab
map cmd+w         close_tab

map kitty_mod+right next_tab
map shift+cmd+]     next_tab
map cmd+]           next_tab
map ctrl+tab        next_tab

map kitty_mod+left  previous_tab
map shift+cmd+[     previous_tab
map cmd+[           previous_tab
map ctrl+shift+tab  previous_tab

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# === macOS cmd-key handling ===
# Kitty forwards unmapped cmd+letter combos to the running program as
# CSI u escape sequences (e.g. ^[[5;9u for cmd+s), which most shells
# don't interpret. Keep useful defaults, swallow the rest.

# --- Preserve kitty's useful built-ins (explicit, not relying on defaults):
map cmd+c     copy_to_clipboard
map cmd+v     paste_from_clipboard
map cmd+q     quit
map cmd+n     new_os_window
map cmd+plus  change_font_size all +2.0
map cmd+equal change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+0     change_font_size all 0

# --- Swallow unmapped cmd+letter (no_op = consumed, not forwarded).
#     cmd+m / cmd+h omitted — those are macOS system shortcuts
#     (minimize / hide) and should reach the OS.
map cmd+a no_op
map cmd+b no_op
map cmd+d no_op
map cmd+e no_op
map cmd+f no_op
map cmd+g no_op
map cmd+i no_op
map cmd+j no_op
map cmd+k no_op
map cmd+l no_op
map cmd+o no_op
map cmd+p no_op
map cmd+r no_op
map cmd+s no_op
map cmd+u no_op
map cmd+x no_op
map cmd+y no_op
map cmd+z no_op
map cmd+, no_op
